<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Mini Card Battle</title>
    <!-- 本番環境でPWA化する時にコメントを外してください -->
    <!-- <link rel="manifest" href="manifest.json"> -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.onerror = function (msg, url, line, col, error) {
            if (typeof showErrorModal === 'function') {
                showErrorModal(msg + "\nLine: " + line + "\nURL: " + url);
            } else {
                alert("Critical Error: " + msg + "\nLine: " + line + "\nURL: " + url);
            }
        };
    </script>
</head>

<body>

    <!-- アプリケーションのUIコンポーネントがここに動的に挿入されます -->
